version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '08:00'
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - automation
    groups:
      # Group low-risk minor/patch updates together so the weekly auto-update
      # workflow can sweep them in a single PR.
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
      security:
        applies-to: security-updates
        update-types:
          - patch
          - minor
          - major

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - automation
      - github-actions
