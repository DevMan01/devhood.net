name: Post-deploy smoke + auto-rollback

# Hits the live site with Playwright after every production deploy.
# On failure: if the deployed commit was authored by the dependency bot,
# the workflow reverts it on main (which triggers a redeploy of the previous
# known-good state). For human commits we open a P0 issue instead — we never
# silently undo manual work.

on:
  workflow_dispatch:
    inputs:
      sha:
        description: 'Commit SHA that was just deployed'
        required: true
        type: string
  # Allow nightly verification too, against the current main HEAD.
  schedule:
    - cron: '0 9 * * *' # 09:00 UTC daily

permissions:
  contents: write
  issues: write
  actions: read

env:
  PROD_URL: https://devhood.net

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      result: ${{ steps.run.outcome }}
      sha: ${{ steps.resolve.outputs.sha }}
      author: ${{ steps.author.outputs.author }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: resolve
        run: |
          if [ -n "${{ inputs.sha }}" ]; then
            echo "sha=${{ inputs.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - id: author
        run: |
          AUTHOR=$(git log -1 --pretty=format:'%ae' ${{ steps.resolve.outputs.sha }})
          echo "author=$AUTHOR" >> "$GITHUB_OUTPUT"
          echo "Commit author: $AUTHOR"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests against production
        id: run
        env:
          PLAYWRIGHT_BASE_URL: ${{ env.PROD_URL }}
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-report-${{ steps.resolve.outputs.sha }}
          path: playwright-report
          retention-days: 30

  rollback_or_alert:
    needs: smoke
    if: failure() && needs.smoke.result == 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Decide rollback vs alert
        id: decide
        env:
          AUTHOR: ${{ needs.smoke.outputs.author }}
        run: |
          # Only auto-revert commits authored by the dependency bot or
          # github-actions. Anything else gets a P0 issue and a human decision.
          case "$AUTHOR" in
            *dependabot*|*github-actions*|*"devhood-bot"*)
              echo "action=revert" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "action=alert" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Auto-revert bot commit
        if: steps.decide.outputs.action == 'revert'
        env:
          BAD_SHA: ${{ needs.smoke.outputs.sha }}
        run: |
          git config user.name  'devhood-bot'
          git config user.email 'devhood-bot@users.noreply.github.com'
          git checkout main
          git revert --no-edit "$BAD_SHA"
          git push origin main

      - name: Open rollback-completed issue
        if: steps.decide.outputs.action == 'revert'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Auto-rollback: smoke tests failed on ${{ needs.smoke.outputs.sha }}`,
              labels: ['rollback', 'automation'],
              body: [
                `Production smoke tests failed after deploying \`${{ needs.smoke.outputs.sha }}\`.`,
                '',
                `Commit author looked automated (\`${{ needs.smoke.outputs.author }}\`), so I reverted it on \`main\`. A redeploy of the previous known-good state is in flight.`,
                '',
                `**Failing run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                'The Playwright report is attached to that run as an artifact.',
              ].join('\n'),
            });

      - name: Open P0 alert (human commit failed)
        if: steps.decide.outputs.action == 'alert'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `P0 — production smoke failed on ${{ needs.smoke.outputs.sha }}`,
              labels: ['P0', 'incident'],
              body: [
                `Production smoke tests failed after the deploy of \`${{ needs.smoke.outputs.sha }}\`.`,
                '',
                `Commit author: \`${{ needs.smoke.outputs.author }}\` (looks human — **no auto-rollback was performed**).`,
                '',
                `**Failing run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                'Decide whether to revert manually or roll forward with a fix.',
              ].join('\n'),
            });
