name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # `security-extended` adds higher-precision queries on top of the
          # default suite (taint tracking, broader CWE coverage).
          queries: security-extended
      # Analyze + upload SARIF to Code Scanning. The merge-block on
      # critical/high alerts is enforced by branch protection
      # (Settings → Branches → Rules → Code scanning alerts threshold).
      - uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
          upload: always
