name: Dependabot auto-merge

# Automatically merges dependabot PRs once all required CI checks pass.
# Strategy:
#   1. Update the branch with the latest main (so we never merge stale code).
#   2. Enable GitHub's native auto-merge (squash) — GitHub will merge as soon
#      as the required status checks go green.
#
# Uses pull_request_target so the GITHUB_TOKEN has write permissions even for
# Dependabot PRs (which otherwise run with a restricted "Dependabot secret"
# context that cannot call write APIs).
#
# Security: the job only runs when github.actor == 'dependabot[bot]', so no
# user-controlled code from the PR branch is executed with elevated permissions.

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Enable auto-merge for dependabot PRs
    runs-on: ubuntu-latest
    # Only act on PRs opened by dependabot
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Rebase onto latest main so we never merge a stale branch.
      # This triggers a new CI run on the updated commit before the merge lands.
      - name: Update branch with latest main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr update-branch ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --rebase || true
          # `|| true` — gh exits non-zero when the branch is already up-to-date;
          # treat that as success.

      # Enable squash auto-merge. GitHub executes the merge automatically once
      # every required status check passes on the updated branch.
      - name: Enable auto-merge (squash)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --squash \
            --auto \
            --delete-branch
