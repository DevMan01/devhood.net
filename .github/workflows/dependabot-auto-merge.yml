name: Dependabot auto-merge

# Automatically merges dependabot PRs once all required CI checks pass.
# Strategy:
#   1. Update the branch with the latest main (so we never merge stale code).
#   2. Enable GitHub's native auto-merge (squash) — GitHub will merge as soon
#      as the required status checks go green.
#
# Only runs for dependabot PRs; human PRs are intentionally excluded.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Enable auto-merge for dependabot PRs
    runs-on: ubuntu-latest
    # Only act on PRs opened by dependabot
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Rebase onto latest main so we never merge a stale branch.
      # This triggers a new CI run on the rebased commit before the merge lands.
      - name: Update branch with latest main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr update-branch ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --rebase || true
          # `|| true` — if the branch is already up-to-date the command exits
          # non-zero; we treat that as success.

      # Enable squash auto-merge. GitHub will execute the merge automatically
      # once every required status check passes on the updated branch.
      - name: Enable auto-merge (squash)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --squash \
            --auto \
            --delete-branch
